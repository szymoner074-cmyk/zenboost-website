<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenBoost Tweak | Professional Gaming Services 🌿</title>
    
    <!-- Czcionki i Ikony -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Skrypty zewnętrzne -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root { 
            --p: #a855f7; 
            --accent: #00d2ff; 
            --bg: #0b0f1a; 
            --card: #161b2c; 
            --text-soft: #b2bac2;
        }
        body { 
            background: var(--bg); 
            background-image: radial-gradient(circle at top center, #130d24 0%, #0b0f1a 100%);
            font-family: 'Montserrat', sans-serif;
            color: var(--text-soft);
            margin: 0;
            overflow-x: hidden;
        }
        .glow-text { text-shadow: 0 0 20px var(--p); }
        .discord-btn {
            background: #5865f2;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .discord-btn:hover {
            background: #4752c4;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(88, 101, 242, 0.4);
        }
        .glass {
            background: rgba(22, 27, 44, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: var(--p); border-radius: 10px; }
        
        .pricing-card {
            background: var(--card);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.4s ease;
        }
        .pricing-card:hover {
            border-color: var(--p);
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }
        .featured-border {
            border: 1px solid var(--p);
            box-shadow: 0 0 30px rgba(168, 85, 247, 0.2);
        }
        .animate-spin-slow { animation: spin 3s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body class="custom-scroll">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- ⚙️ KONFIGURACJA OAUTH2 ---
        const CLIENT_ID = '1490818531955183747'; 
        const REDIRECT_URI = 'http://zenboost-tweak.pl/'; // Wpisz to na sztywno, bez encodeURIComponent
        const DISCORD_AUTH_URL = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=code&scope=identify%20email&prompt=consent`;
        // Dodano prompt=consent, aby wymusić okno autoryzacji
        const API_BASE = 'https://api.zenboost-tweak.pl';

        const App = () => {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(false);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [selectedService, setSelectedService] = useState('');
            const [formData, setFormData] = useState({ specs: '', payment: '' });
            const [success, setSuccess] = useState(false);
            const [refreshing, setRefreshing] = useState(false);

            useEffect(() => {
                const urlParams = new URLSearchParams(window.location.search);
                const code = urlParams.get('code');
                if (code) verifyDiscordUser(code);
            }, []);

            const verifyDiscordUser = async (code) => {
                setLoading(true);
                try {
                    const res = await fetch(`${API_BASE}/api/auth/discord`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ code })
                    });
                    const data = await res.json();

                    if (data.authorized) {
                        setUser({
                            ...data.user,
                            onServer: data.onServer
                        });
                        window.history.replaceState({}, document.title, "/");
                    }
                } catch (e) {
                    console.error("Auth error:", e);
                }
                setLoading(false);
            };

            // Nowa funkcja do sprawdzania obecności na serwerze bez przelogowania
            const checkServerStatus = async () => {
                if (!user) return;
                setRefreshing(true);
                try {
                    const res = await fetch(`${API_BASE}/api/check-membership?userId=${user.id}`);
                    const data = await res.json();
                    setUser(prev => ({ ...prev, onServer: data.onServer }));
                    if (data.onServer) {
                        console.log("Status zaktualizowany: Jesteś na serwerze!");
                    }
                } catch (e) {
                    console.error("Błąd sprawdzania statusu:", e);
                }
                setTimeout(() => setRefreshing(false), 800);
            };

            const handleSendOrder = async () => {
                if (!formData.specs || !formData.payment) return alert("Wypełnij wszystkie pola!");
                setLoading(true);
                try {
                    const res = await fetch(`${API_BASE}/api/nowe-zamowienie`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            userId: user.id,
                            username: user.username,
                            email: user.email,
                            avatar: user.avatar,
                            gra: selectedService,
                            specs: formData.specs,
                            platnosc: formData.payment
                        })
                    });
                    if (res.ok) setSuccess(true);
                } catch (e) { alert("Błąd połączenia."); }
                setLoading(false);
            };

            const PricingCard = ({ title, price, features, featured }) => (
                <div className={`pricing-card p-8 rounded-[30px] flex flex-col ${featured ? 'featured-border scale-105 z-10' : ''}`}>
                    {featured && <div className="bg-[#a855f7] text-white text-[10px] font-black uppercase px-4 py-1 rounded-full self-center mb-4 tracking-widest shadow-[0_0_15px_#a855f7]">Polecane</div>}
                    <h3 className="text-xl font-bold text-white mb-2">{title}</h3>
                    <div className="text-4xl font-black text-[#00d2ff] my-6">{price} <span className="text-lg">PLN</span></div>
                    <ul className="flex-grow space-y-3 mb-8">
                        {features.map((f, i) => (
                            <li key={i} className="text-sm flex items-center gap-3">
                                <i className="fas fa-check-circle text-[#a855f7]"></i> {f}
                            </li>
                        ))}
                    </ul>
                    <button 
                        onClick={() => { setSelectedService(`${title} (${price} PLN)`); setIsModalOpen(true); setSuccess(false); }}
                        className="w-full bg-[#a855f7] hover:brightness-110 text-white py-4 rounded-xl font-black uppercase transition-all shadow-lg active:scale-95"
                    >
                        Wybierz
                    </button>
                </div>
            );

            if (!user) {
                return (
                    <div className="h-screen flex flex-col items-center justify-center text-center px-4">
                        <h1 className="text-6xl md:text-8xl font-black text-white glow-text mb-6 uppercase tracking-tighter">ZEN<span className="text-[#a855f7]">BOOST</span></h1>
                        <p className="text-lg mb-10 max-w-md opacity-70 leading-relaxed">Zaloguj się kontem Discord, aby uzyskać dostęp do strefy Premium.</p>
                        <a href={DISCORD_AUTH_URL} className="discord-btn px-12 py-6 rounded-2xl text-white font-black uppercase flex items-center gap-4 text-xl shadow-2xl">
                            {loading ? <i className="fas fa-circle-notch fa-spin text-2xl"></i> : <><i className="fab fa-discord text-3xl"></i> Zaloguj przez Discord</>}
                        </a>
                    </div>
                );
            }

            return (
                <div className="min-h-screen pb-20">
                    <nav className="p-6 flex justify-between items-center glass sticky top-0 z-[100]">
                        <h2 className="text-2xl font-black text-white tracking-tighter">ZEN<span className="text-[#a855f7]">BOOST</span></h2>
                        <div className="flex items-center gap-4 bg-black/40 p-1 pr-4 rounded-full border border-white/10">
                            <img src={user.avatar} className="w-10 h-10 rounded-full border-2 border-[#a855f7]" alt="Avatar" />
                            <span className="text-white font-bold text-sm">{user.username}</span>
                        </div>
                    </nav>

                    <header className="h-[40vh] flex flex-col items-center justify-center text-center px-4">
                        <h1 className="text-6xl font-black text-white glow-text mb-4 uppercase">Strefa <span className="text-[#a855f7]">Premium</span></h1>
                        <p className="text-sm font-bold text-[#a855f7] tracking-[0.4em] uppercase mb-8">Nasze Social Media</p>
                        <div className="flex gap-5">
                            <a href="https://discord.gg/pH5yNGd22k" target="_blank" className="w-14 h-14 rounded-full glass flex items-center justify-center text-white border-white/10 hover:border-[#a855f7] transition-all"><i className="fab fa-discord text-2xl"></i></a>
                            <a href="https://tiktok.com/@seyven" target="_blank" className="w-14 h-14 rounded-full glass flex items-center justify-center text-white border-white/10 hover:border-[#a855f7] transition-all"><i className="fab fa-tiktok text-2xl"></i></a>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto px-6 space-y-32">
                        <section className="grid grid-cols-1 md:grid-cols-3 gap-8">
                            {[
                                { icon: "shield-alt", t: "Bezpieczeństwo", d: "ID urządzenia i weryfikacja OAuth2 gwarantują bezpieczne zamówienie." },
                                { icon: "bolt", t: "Wydajność", d: "Zapewniamy najwyższą płynność i więcej FPS w każdej grze." },
                                { icon: "medal", t: "Doświadczenie", d: "Setki zadowolonych graczy potwierdzają naszą jakość usług." }
                            ].map((item, idx) => (
                                <div key={idx} className="glass p-10 rounded-3xl border-white/5 hover:border-[#a855f7] transition-all text-center">
                                    <i className={`fas fa-${item.icon} text-4xl text-[#a855f7] mb-6`}></i>
                                    <h4 className="text-white font-bold mb-2 text-xl">{item.t}</h4>
                                    <p className="text-xs opacity-60 leading-relaxed">{item.d}</p>
                                </div>
                            ))}
                        </section>

                        <section>
                            <h2 className="text-3xl font-black text-white text-center mb-16 uppercase tracking-widest"><i className="fas fa-bolt text-[#a855f7] mr-4"></i> OPTYMALIZACJE PC</h2>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                                <PricingCard title="Zwykły Boost" price="50" features={["System Tweaking", "BIOS Tweaking", "24/7 Support"]} />
                                <PricingCard title="Lepszy Boost" price="100" features={["Custom Windows", "BIOS Tweak", "Input Lag Fix", "Monitor Settings"]} featured />
                                <PricingCard title="Custom OS + Boost" price="150" features={["Custom Windows", "Full Hardware OC", "BIOS Tweak", "Network Settings", "Advanced Tweaks"]} />
                            </div>
                        </section>

                        <section>
                            <h2 className="text-3xl font-black text-white text-center mb-16 uppercase tracking-widest"><i className="fas fa-robot text-[#a855f7] mr-4"></i> BOTY DISCORD</h2>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                                <PricingCard title="Startowy Bot" price="200" features={["Moderacja", "Witacz", "System Logów"]} />
                                <PricingCard title="Ekonomiczny Plus" price="500" features={["Ekonomia", "Sklep", "Bazy SQL", "System Leveli"]} featured />
                                <PricingCard title="Mega Custom Bot" price="1000" features={["OAuth2", "Płatności BLIK", "Hosting", "Panel WWW", "Minigry"]} />
                            </div>
                        </section>

                        <section>
                            <h2 className="text-3xl font-black text-white text-center mb-16 uppercase tracking-widest"><i className="fas fa-globe text-[#a855f7] mr-4"></i> STRONY WWW</h2>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                                <PricingCard title="Landing Page" price="300" features={["RWD Mobile", "Modern Design"]} />
                                <PricingCard title="Gamingowa" price="600" features={["Glow Effects", "Widgety Discord", "RWD Premium"]} featured />
                                <PricingCard title="Dashboard / Sklep" price="1000" features={["Logowanie Discord", "System Płatności", "Baza Danych"]} />
                            </div>
                        </section>
                    </main>

                    {/* Team */}
                    <section className="bg-black/30 py-32 border-t border-white/5 mt-32 text-center">
                        <h2 className="text-white text-3xl font-black uppercase tracking-[0.4em] mb-20">Ownerzy Serwera</h2>
                        <div className="flex flex-wrap justify-center gap-24">
                            <div className="group">
                                <div className="w-44 h-44 rounded-full border-4 border-[#a855f7] p-1.5 shadow-[0_0_25px_rgba(168,85,247,0.3)] overflow-hidden mx-auto mb-6 group-hover:scale-110 transition-all duration-500"><img src="z.png" className="w-full h-full object-cover rounded-full" /></div>
                                <h3 className="text-xl font-black text-white mb-2 uppercase tracking-widest">ZENBOOST</h3>
                                <p className="text-[#00d2ff] font-bold text-[0.7rem] uppercase tracking-widest">Twórca treści</p>
                            </div>
                            <div className="group">
                                <div className="w-44 h-44 rounded-full border-4 border-[#a855f7] p-1.5 shadow-[0_0_25px_rgba(168,85,247,0.3)] overflow-hidden mx-auto mb-6 group-hover:scale-110 transition-all duration-500"><img src="s.jpg" className="w-full h-full object-cover rounded-full" /></div>
                                <h3 className="text-xl font-black text-white mb-2 uppercase tracking-widest uppercase">SEYVEN</h3>
                                <p className="text-[#00d2ff] font-bold text-[0.7rem] uppercase tracking-widest">Twórca strony & bota</p>
                            </div>
                        </div>
                    </section>

                    {/* MODAL ZAMÓWIENIA */}
                    {isModalOpen && (
                        <div className="fixed inset-0 bg-black/90 backdrop-blur-md flex items-center justify-center p-4 z-[200]">
                            <div className="bg-[#1e1f22] w-full max-w-md rounded-3xl overflow-hidden shadow-2xl border border-white/10">
                                <div className="p-6 border-b border-white/5 flex justify-between items-center">
                                    <h3 className="text-white font-bold uppercase text-xs tracking-widest">Konfiguracja Ticketu</h3>
                                    <i className="fas fa-times cursor-pointer text-[#b5bac1] hover:text-white" onClick={() => setIsModalOpen(false)}></i>
                                </div>

                                {!user.onServer ? (
                                    <div className="p-10 text-center space-y-6">
                                        <div className="w-20 h-20 bg-yellow-500/10 rounded-full flex items-center justify-center mx-auto mb-6">
                                            <i className="fas fa-exclamation-triangle text-4xl text-yellow-500"></i>
                                        </div>
                                        <h2 className="text-white text-xl font-black uppercase">Nie jesteś na serwerze!</h2>
                                        <p className="text-sm opacity-60 leading-relaxed">Aby złożyć zamówienie, musisz być członkiem naszego Discorda. Dołącz teraz, a potem kliknij przycisk poniżej.</p>
                                        <div className="flex flex-col gap-4">
                                            <a href="https://discord.gg/pH5yNGd22k" target="_blank" className="bg-[#5865f2] block py-4 rounded-xl text-white font-black uppercase shadow-xl hover:brightness-110">DOŁĄCZ DO NAS 🚀</a>
                                            <button 
                                                onClick={checkServerStatus}
                                                disabled={refreshing}
                                                className="text-sm font-bold text-[#a855f7] hover:underline flex items-center justify-center gap-3 mx-auto mt-2"
                                            >
                                                <i className={`fas fa-sync-alt ${refreshing ? 'animate-spin' : ''}`}></i>
                                                {refreshing ? 'Sprawdzanie...' : 'Zrobiłem to, sprawdź ponownie'}
                                            </button>
                                        </div>
                                    </div>
                                ) : !success ? (
                                    <div className="p-6 space-y-6">
                                        <div className="p-4 bg-black/30 rounded-2xl flex items-center gap-4 border border-white/5">
                                            <img src={user.avatar} className="w-12 h-12 rounded-full border border-[#a855f7]" />
                                            <div>
                                                <div className="text-[10px] uppercase font-black opacity-40 leading-none mb-1">Tożsamość Potwierdzona</div>
                                                <div className="text-white font-bold text-sm">{user.username} <span className="text-[10px] opacity-30">({user.email})</span></div>
                                            </div>
                                        </div>

                                        <div className="space-y-4">
                                            <div>
                                                <label className="text-[10px] font-black uppercase opacity-40 block mb-2">Wybrany pakiet</label>
                                                <div className="w-full bg-[#2b2d31] p-4 rounded-xl text-[#a855f7] font-black border border-white/5">{selectedService}</div>
                                            </div>
                                            <div>
                                                <label className="text-[10px] font-black uppercase opacity-40 block mb-2">Specyfikacja / Opis PC*</label>
                                                <textarea onChange={e => setFormData({...formData, specs: e.target.value})} className="w-full bg-[#2b2d31] p-4 rounded-xl text-white h-24 focus:ring-1 ring-[#a855f7] outline-none border border-white/5 resize-none" placeholder="Napisz coś o swoich wymaganiach..."></textarea>
                                            </div>
                                            <div>
                                                <label className="text-[10px] font-black uppercase opacity-40 block mb-2">Metoda Płatności*</label>
                                                <select onChange={e => setFormData({...formData, payment: e.target.value})} className="w-full bg-[#2b2d31] p-4 rounded-xl text-white focus:ring-1 ring-[#a855f7] outline-none border border-white/5">
                                                    <option value="">Wybierz...</option>
                                                    <option value="BLIK">BLIK</option>
                                                    <option value="PSC">PSC</option>
                                                </select>
                                            </div>
                                        </div>

                                        <button onClick={handleSendOrder} disabled={loading} className="w-full bg-[#5865f2] py-5 rounded-2xl text-white font-black uppercase shadow-xl hover:bg-[#4752c4] transition-all flex items-center justify-center gap-3">
                                            {loading ? <i className="fas fa-circle-notch fa-spin"></i> : "Otwórz Ticket 🚀"}
                                        </button>
                                    </div>
                                ) : (
                                    <div className="p-12 text-center space-y-6">
                                        <i className="fas fa-check-circle text-6xl text-green-500"></i>
                                        <h2 className="text-white text-2xl font-black uppercase tracking-tighter">Wysłano Pomyślnie!</h2>
                                        <p className="text-sm opacity-60">Bot otworzył kanał na Discordzie pod Twoim nickiem. Zapraszamy!</p>
                                        <a href="https://discord.gg/pH5yNGd22k" target="_blank" className="bg-green-600 block py-5 rounded-2xl text-white font-black uppercase shadow-xl">Przejdź do Discorda</a>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    <footer className="mt-32 text-center py-10 opacity-30">
                        <p className="text-[10px] uppercase font-bold tracking-[0.3em]">ZenBoost Project &copy; 2024 | All Rights Reserved</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
