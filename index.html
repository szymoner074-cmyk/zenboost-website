<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenBoost | Szybkie Doładowania</title>
    <style>
        :root { --p: #a855f7; --bg: #0f172a; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        .card { background: #1e293b; padding: 20px; border-radius: 15px; border: 1px solid var(--p); margin: 10px; cursor: pointer; transition: 0.3s; }
        .card:hover { transform: scale(1.05); box-shadow: 0 0 20px var(--p); }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; }
        .modal-content { background: #1e293b; padding: 30px; border-radius: 20px; width: 90%; max-width: 400px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; }
        button { background: var(--p); color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; }
        .status { color: #4ade80; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="color: var(--p)">🌿 ZenBoost Store</h1>
    <p class="status">● System Online (93.189.89.101)</p>

    <div class="card" onclick="openModal('ZenBoost Premium', '49.99 PLN')">
        <h3>💎 ZenBoost Premium</h3>
        <p>Najlepszy wybór dla Twojego konta</p>
        <button>Wybierz - 49.99 PLN</button>
    </div>

    <div class="card" onclick="openModal('ZenBoost Basic', '19.99 PLN')">
        <h3>⚡ ZenBoost Basic</h3>
        <p>Szybki start w niskiej cenie</p>
        <button>Wybierz - 19.99 PLN</button>
    </div>
</div>

<div id="orderModal" class="modal">
    <div class="modal-content">
        <h2 id="mTitle">Zamówienie</h2>
        <input type="text" id="nick" placeholder="Twój Nick Discord (np. Seyven#1234)">
        <input type="text" id="kontakt" placeholder="Metoda płatności (PSC/BLIK)">
        <button onclick="sendToBot()">POTWIERDZAM ZAKUP</button>
        <button onclick="closeModal()" style="background: #475569; margin-top: 10px;">Anuluj</button>
    </div>
</div>

<script>
    let currentProduct = "";

    function openModal(name, price) {
        currentProduct = name;
        document.getElementById('mTitle').innerText = name + " - " + price;
        document.getElementById('orderModal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('orderModal').style.display = 'none';
    }

    async function sendToBot() {
        const nick = document.getElementById('nick').value;
        const kontakt = document.getElementById('kontakt').value;

        if(!nick || !kontakt) return alert("Wypełnij wszystkie pola!");

        const data = {
            klient: nick,
            gra: "Sklep Internetowy",
            typ: currentProduct,
            specs: "Brak dodatkowych uwag",
            kontakt: kontakt
        };

        try {
            // BACKTICKI SĄ TUTAJ KLUCZEM! ` `
            const response = await fetch(`http://93.189.89.101:3000/nowe-zamowienie`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (response.ok) {
                alert("🚀 WYSŁANO! Sprawdź Discorda.");
                closeModal();
            } else {
                alert("❌ Błąd serwera bota.");
            }
        } catch (e) {
            alert("❌ Brak połączenia! Upewnij się, że masz wyłączone Tarcze Brave i Allow w ustawieniach.");
        }
    }
</script>

</body>
</html>
