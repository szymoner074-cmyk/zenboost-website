<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenBoost Tweak | High Performance 🌿</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root { --p: #a855f7; --accent: #00d2ff; --bg: #0b0f1a; --card: #111522; --gaming: #22d3ee; }
        body { background: var(--bg); color: #b2bac2; font-family: 'Montserrat', sans-serif; margin: 0; }
        .glow-text { text-shadow: 0 0 15px var(--p); }
        .zen-logo { transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); position: relative; }
        .zen-logo.scrolled { position: fixed; top: 25px; left: 40px; font-size: 1.8rem !important; z-index: 1200; }
        .avatar-frame { position: relative; padding: 8px; border-radius: 50%; border: 4px solid var(--p); transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 0 20px rgba(168, 85, 247, 0.4); }
        .group:hover .avatar-frame { transform: scale(1.15) rotate(360deg); }
        .owner-name { color: var(--p); font-weight: 900; transition: 0.4s; }
        .social-fixed { position: fixed; right: 25px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 15px; z-index: 1000; }
        .social-icon { width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: rgba(22, 27, 44, 0.8); border: 1px solid rgba(168, 85, 247, 0.3); color: white; transition: 0.3s; }
        .service-card { background: var(--card); transition: 0.4s; border: 1px solid rgba(255,255,255,0.03); }
        .feature-box { background: #0f131f; border: 1px solid rgba(255,255,255,0.05); height: 100%; }
        .tick-icon { width: 20px; height: 20px; background: var(--p); border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .logout-menu { position: absolute; top: 100%; right: 0; margin-top: 10px; background: #1e1f22; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 8px; z-index: 2000; }
    </style>
</head>
<body class="overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
        // Używamy globalnych obiektów React zamiast importów
        const { useState, useEffect, useRef } = React;

        const CLIENT_ID = '1490818531955183747'; 
        const REDIRECT_URI = 'http://zenboost-tweak.pl/'; 
        const DISCORD_AUTH_URL = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=code&scope=identify%20email&prompt=consent`;
        const API_BASE = 'https://api.zenboost-tweak.pl';

        const App = () => {
            const [user, setUser] = useState(null);
            const [activeTickets, setActiveTickets] = useState(0);
            const [isScrolled, setIsScrolled] = useState(false);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [showLogout, setShowLogout] = useState(false);
            const [selectedService, setSelectedService] = useState('');
            const [formData, setFormData] = useState({ specs: '', payment: '' });
            const [success, setSuccess] = useState(false);
            const [loading, setLoading] = useState(false);
            const logoutRef = useRef(null);

            useEffect(() => {
                const handleScroll = () => setIsScrolled(window.scrollY > 150);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const PricingCard = ({ title, price, features, featured }) => (
                <div className={`service-card p-10 rounded-[45px] text-center ${featured ? 'border-[#a855f7] scale-105' : ''}`}>
                    {featured && <div className="bg-[#a855f7] text-white text-[10px] font-black uppercase px-4 py-1 rounded-full mb-4">Polecane</div>}
                    <h3 className="text-2xl font-bold text-white mb-2">{title}</h3>
                    <div className="text-5xl font-black text-[#22d3ee] my-8">{price} PLN</div>
                    <ul className="text-left space-y-4 mb-10 opacity-70">
                        {features.map((f, i) => (
                            <li key={i} className="text-sm flex items-start gap-3">
                                <div className="tick-icon"><i className="fas fa-check text-[10px] text-white"></i></div>
                                <span>{f}</span>
                            </li>
                        ))}
                    </ul>
                    <button onClick={() => {setSelectedService(`${title} (${price} PLN)`); setIsModalOpen(true);}} className="w-full bg-[#a855f7] py-5 rounded-2xl text-white font-black uppercase">Wybierz Pakiet</button>
                </div>
            );

            return (
                <div className="min-h-screen">
                    <nav className={`p-6 flex justify-end fixed top-0 w-full z-[1100] transition-all ${isScrolled ? 'bg-black/40 backdrop-blur-md' : ''}`}>
                        {user ? (
                            <div className="relative" onClick={() => setShowLogout(!showLogout)} ref={logoutRef}>
                                <div className="flex items-center gap-4 bg-black/40 p-1.5 pr-6 rounded-full border border-white/5 cursor-pointer">
                                    <img src={user.avatar} className="w-10 h-10 rounded-full" />
                                    <span className="text-white font-bold text-sm">{user.username}</span>
                                </div>
                                {showLogout && <div className="logout-menu"><button onClick={() => setUser(null)} className="text-red-400 font-bold p-2">Wyloguj</button></div>}
                            </div>
                        ) : (
                            <a href={DISCORD_AUTH_URL} className="bg-[#5865f2] px-6 py-3 rounded-xl text-white font-black uppercase text-xs">Zaloguj</a>
                        )}
                    </nav>

                    <header className="h-[60vh] flex flex-col items-center justify-center text-center">
                        <h1 className={`zen-logo text-9xl font-black text-white ${isScrolled ? 'scrolled' : ''}`}>ZEN<span className="text-[#a855f7]">BOOST</span></h1>
                    </header>

                    <main className="max-w-7xl mx-auto px-6">
                        <section>
                            <h2 className="text-4xl font-black text-white mb-16 text-center">Optymalizacje PC</h2>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-10">
                                <PricingCard title="Zwykły Boost" price="50" features={["Full System Tweaking", "BIOS Tweaking"]} />
                                <PricingCard title="Lepszy Boost" price="100" features={["Custom Windows", "Full System Tweaking", "BIOS Tweaking"]} featured />
                                <PricingCard title="Custom Windows + Boost" price="150" features={["Custom Windows", "Full System Tweaking", "Hardware Overclocking"]} />
                            </div>
                        </section>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
